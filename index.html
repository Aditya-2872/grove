<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Grove — grow your goals in a calm, personal space." />

    <!-- Installable to a home screen: the launcher icon IS the reminder to come
         back. Standalone display, Grove's dark tile, and a PNG apple-touch-icon
         (iOS ignores SVG icons). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0d0b" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grove" />

    <!-- Link preview. Pasting the URL is the whole distribution channel for an
         app whose argument is how it looks, so it shouldn't unfurl as a grey
         box. Scrapers don't run JS and need ABSOLUTE image URLs, hence the
         hardcoded origin — update these two if the domain ever changes. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Grove" />
    <meta property="og:title" content="Grove — grow your goals in a calm, personal space" />
    <meta
      property="og:description"
      content="A widget canvas for the things you're tending: streaks, metrics, checklists and timers, arranged how you like. No signup to try."
    />
    <meta property="og:url" content="https://grove-red-sigma.vercel.app/" />
    <meta property="og:image" content="https://grove-red-sigma.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Grove — a calm, dark widget canvas for tending your goals." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Grove — grow your goals in a calm, personal space" />
    <meta
      name="twitter:description"
      content="A widget canvas for the things you're tending. No signup to try."
    />
    <meta name="twitter:image" content="https://grove-red-sigma.vercel.app/og.png" />

    <title>Grove</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
